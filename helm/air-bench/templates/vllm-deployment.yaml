apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "air-bench.vllm.fullname" . }}
  labels:
    {{- include "air-bench.labels" . | nindent 4 }}
    app.kubernetes.io/component: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: vllm
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: vllm
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- if .Values.vllm.runtimeClassName }}
      runtimeClassName: {{ .Values.vllm.runtimeClassName }}
      {{- end }}
      containers:
        - name: vllm
          image: "{{ .Values.vllm.image.repository }}:{{ .Values.vllm.image.tag }}"
          imagePullPolicy: {{ .Values.vllm.image.pullPolicy }}
          args:
            - vllm
            - serve
            - {{ .Values.vllm.model }}
            - --gpu-memory-utilization
            - {{ .Values.vllm.gpuMemoryUtilization | quote }}
            - --host
            - "0.0.0.0"
            - --port
            - {{ .Values.vllm.service.port | quote }}
            {{- range .Values.vllm.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          ports:
            - containerPort: {{ .Values.vllm.service.port }}
              name: http
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.vllm.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.vllm.modelCache.enabled }}
            - name: model-cache
              mountPath: /root/.cache/huggingface
            {{- end }}
      volumes:
        {{- if .Values.vllm.modelCache.enabled }}
        - name: model-cache
          persistentVolumeClaim:
            claimName: {{ include "air-bench.vllm.fullname" . }}-model-cache
        {{- end }}
